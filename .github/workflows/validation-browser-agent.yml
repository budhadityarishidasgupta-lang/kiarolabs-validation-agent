name: Validation Browser Agent

on:
  workflow_dispatch:
    inputs:
      enable_mutations:
        description: "Run mutation-based admin tests"
        required: false
        default: "false"
  schedule:
    - cron: "0 6,18 * * *"

jobs:
  browser-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          npm install
          npx playwright install --with-deps chromium
          python -m pip install -r requirements.txt

      - name: Run browser validation
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_ENABLE_MUTATIONS: ${{ github.event.inputs.enable_mutations || 'false' }}
        run: |
          mkdir -p reports
          npm run e2e

      - name: Run optional DB verification
        if: always()
        env:
          E2E_ENABLE_MUTATIONS: ${{ github.event.inputs.enable_mutations || 'false' }}
          VALIDATION_DB_DSN: ${{ secrets.VALIDATION_DB_DSN }}
        run: |
          python -m validation_agent.db_verify

      - name: Upload browser artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-browser-agent-artifacts
          path: |
            playwright-report/
            test-results/
            reports/
