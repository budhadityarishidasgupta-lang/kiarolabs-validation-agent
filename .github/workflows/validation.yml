name: Validation Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

jobs:
  backend-validation:
    runs-on: ubuntu-latest

    env:
      VALIDATION_BASE_URL: ${{ secrets.VALIDATION_BASE_URL }}
      VALIDATION_ADMIN_EMAIL: ${{ secrets.VALIDATION_ADMIN_EMAIL }}
      VALIDATION_ADMIN_PASSWORD: ${{ secrets.VALIDATION_ADMIN_PASSWORD }}
      VALIDATION_TEST_ADMIN_EMAIL: ${{ secrets.VALIDATION_TEST_ADMIN_EMAIL }}
      VALIDATION_TEST_ADMIN_PASSWORD: ${{ secrets.VALIDATION_TEST_ADMIN_PASSWORD }}
      VALIDATION_STUDENT_EMAIL: ${{ secrets.VALIDATION_STUDENT_EMAIL }}
      VALIDATION_STUDENT_PASSWORD: ${{ secrets.VALIDATION_STUDENT_PASSWORD }}
      VALIDATION_FAIL_ON_FAILURE: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend validation agent
        run: python main.py

      - name: Upload backend reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-backend-reports
          path: reports/
          if-no-files-found: ignore

  browser-e2e:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run browser E2E
        run: npm run e2e

      - name: Upload browser E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-browser-e2e-artifacts
          path: |
            playwright-report/
            test-results/
            reports/
          if-no-files-found: ignore
